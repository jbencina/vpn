services:
  dnscrypt-proxy:
    container_name: dnscrypt-proxy
    build: ./dnscrypt-proxy
    network_mode: host
    restart: unless-stopped
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    network_mode: host
    depends_on:
      - dnscrypt-proxy
    environment:
      TZ: 'America/Los_Angeles'
      DNS1: '127.0.0.1#5053'
      DNS2: 'no'
    volumes:
      - './etc-pihole/:/etc/pihole/'
      - './etc-dnsmasq.d/:/etc/dnsmasq.d/'
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

